services:
  postgres:
    image: postgres:16-alpine
    container_name: safa-postgres
    environment:
      POSTGRES_USER: safa
      POSTGRES_PASSWORD: safa
      POSTGRES_DB: safa
    ports:
      - "5432:5432"
    volumes:
      - safa_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safa -d safa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: safa-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  safa_postgres:
