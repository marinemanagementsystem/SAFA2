services:
  - type: web
    name: safa-api
    runtime: node
    plan: free
    region: frankfurt
    healthCheckPath: /api/settings
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm db:generate && pnpm --filter @safa/api build
    preDeployCommand: pnpm --filter @safa/api db:migrate
    startCommand: pnpm --filter @safa/api start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: safa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: safa-redis
          property: connectionString
      - key: APP_SECRET_KEY
        generateValue: true
      - key: INVOICE_PROVIDER
        value: gib-direct
      - key: EARSIV_PORTAL_BASE_URL
        value: https://earsivportal.efatura.gov.tr

  - type: web
    name: safa-web
    runtime: node
    plan: free
    region: frankfurt
    healthCheckPath: /
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @safa/web build
    startCommand: pnpm --filter @safa/web start
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PROXY_HOSTPORT
        fromService:
          type: web
          name: safa-api
          property: hostport

  - type: keyvalue
    name: safa-redis
    plan: free
    region: frankfurt
    ipAllowList: []

databases:
  - name: safa-db
    plan: free
    region: frankfurt
    databaseName: safa
    user: safa
